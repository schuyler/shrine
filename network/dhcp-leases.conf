# Static DHCP leases for the shrine installation network.
# Fill in MAC addresses before running install.sh.

# Edge nodes
dhcp-host=XX:XX:XX:XX:XX:XX,node0,10.0.42.10
dhcp-host=XX:XX:XX:XX:XX:XX,node1,10.0.42.11
dhcp-host=XX:XX:XX:XX:XX:XX,node2,10.0.42.12
dhcp-host=XX:XX:XX:XX:XX:XX,node3,10.0.42.13

# WLED boxes
dhcp-host=XX:XX:XX:XX:XX:XX,wled0,10.0.42.20
dhcp-host=XX:XX:XX:XX:XX:XX,wled1,10.0.42.21
dhcp-host=XX:XX:XX:XX:XX:XX,wled2,10.0.42.22
dhcp-host=XX:XX:XX:XX:XX:XX,wled3,10.0.42.23

# DHCP range for unregistered devices
dhcp-range=10.0.42.100,10.0.42.199,24h
dhcp-option=option:router,10.0.42.1
dhcp-option=option:dns-server,10.0.42.1
