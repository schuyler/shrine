# Conductor state machine configuration
# All time values are in seconds.

sensing:
  # Schmitt trigger thresholds for pad presence (cap signal, normalized 0-1)
  cap_on_threshold: 0.6
  cap_off_threshold: 0.4
  cap_hold_on: 0.3       # must stay above on_threshold this long to become engaged
  cap_hold_off: 0.5      # must stay below off_threshold this long to become disengaged

  # Schmitt trigger thresholds for pad-pair coupling (gsr_mag, normalized 0-1)
  gsr_on_threshold: 0.4
  gsr_off_threshold: 0.25
  gsr_hold_on: 0.5
  gsr_hold_off: 1.0

  # How long a connection condition must hold continuously to confirm an upward transition
  confirm_hold: 5.0

buckets:
  seeking:
    fill_rate: 1.0        # seconds of credit per second while ≥1 pad engaged
    drain_rate: 0.5       # seconds drained per second while no pad engaged
    full_at: 120.0
    entry_seed: 0.0

  aligning:
    fill_rate: 1.0        # fills while group ≥ 2
    drain_rate: 0.5
    full_at: 120.0
    entry_seed: 60.0

  energizing:
    fill_rate: 1.0        # fills while group ≥ 3
    drain_rate: 0.5
    full_at: 60.0
    entry_seed: 30.0

  ascending:
    dwell: 60.0           # fixed dwell before decaying to Energizing

tempo:
  quiet: 50
  seeking: [60, 70]
  aligning: [70, 80]
  energizing: [80, 90]
  ascending: 100

# Melodic re-fire grid, in clock ticks per re-fire (clock = 16th-note tick,
# 4 ticks/beat). Smaller = denser: 16=bar, 8=half, 4=quarter, 2=eighth,
# 1=sixteenth. A held connection re-advances the walk on this grid; the first
# note still fires immediately on touch. Like tempo, a scalar is fixed and a
# [calm, agitated] pair interpolates with bucket fill (calm = empty bucket).
# The grid tightens as the room comes together, so the texture reads as rhythm
# rather than scattered chimes. These are STARTING POINTS — tune by ear on the
# installation. Broadcast on /shrine/cue/refire; omit this section to disable.
subdiv:
  quiet: 16          # bar — sparse re-blooms; the attack carries it
  seeking: [16, 8]   # bar → half as engagement builds
  aligning: [8, 4]   # half → quarter
  energizing: [4, 2] # quarter → eighth
  ascending: 2       # eighth — driving

idle:
  # Global idle bucket: fills while 0 pads engaged, forces Quiet at timeout
  timeout: 180.0
  drain_rate: 1.0         # drains at 1:1 while any pad is engaged

programs:
  quiet: "breathe"
  seeking: "pulse"
  aligning: "converge"
  energizing: "converge"
  ascending: "bloom"

palettes:
  quiet: "default"
  seeking: "default"
  aligning: "default"
  energizing: "default"
  ascending: "ascending"

program_params:
  breathe:
    sx:
      base: 128
      scale: 0.0
    ix:
      base: 128
      scale: 0.0
  pulse:
    sx:
      base: 70
      scale: 0.0
    ix:
      base: 128
      scale: 0.0
  converge:
    sx:
      base: 100
      scale: 0.5
    ix:
      base: 128
      scale: 0.0
